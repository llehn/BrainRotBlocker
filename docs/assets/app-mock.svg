<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Segoe UI, sans-serif" role="img" aria-label="BrainRotBlocker app screenshot">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8071F2"/><stop offset="1" stop-color="#B14BE0"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g filter="url(#sh)">
    <rect x="20" y="20" width="720" height="440" rx="16" fill="#1C1D22"/>
    <!-- title bar -->
    <path d="M20 36 a16 16 0 0 1 16 -16 h688 a16 16 0 0 1 16 16 v24 h-720 z" fill="#26272E"/>
    <circle cx="44" cy="40" r="5" fill="#3C3E47"/>
    <rect x="40" y="32" width="16" height="16" rx="4" fill="url(#acc)"/>
    <text x="66" y="45" fill="#ECECF0" font-size="13" font-weight="600">BrainRotBlocker</text>

    <!-- header -->
    <text x="44" y="98" fill="#ECECF0" font-size="22" font-weight="700">BrainRotBlocker</text>
    <rect x="500" y="80" width="150" height="30" rx="15" fill="#32333B"/>
    <circle cx="520" cy="95" r="5" fill="#34D399"/>
    <text x="532" y="99" fill="#A6A7B2" font-size="12.5">Protection active</text>
    <rect x="660" y="80" width="56" height="30" rx="9" fill="#32333B"/>
    <text x="676" y="99" fill="#ECECF0" font-size="12.5">⚙</text>

    <!-- card: Short video -->
    <rect x="44" y="140" width="320" height="150" rx="14" fill="#26272E" stroke="#3C3E47"/>
    <text x="66" y="174" fill="#ECECF0" font-size="16" font-weight="600">Short video</text>
    <text x="66" y="200" fill="#A6A7B2" font-size="12.5">5 min / hour · all day · every day</text>
    <text x="66" y="224" fill="#A6A7B2" font-size="12.5">YouTube Shorts, Instagram Reels +2</text>
    <circle cx="72" cy="262" r="5" fill="#34D399"/>
    <text x="84" y="266" fill="#A6A7B2" font-size="12.5">4 m 12 s left</text>

    <!-- card: Bedtime -->
    <rect x="396" y="140" width="320" height="150" rx="14" fill="#26272E" stroke="#3C3E47"/>
    <text x="418" y="174" fill="#ECECF0" font-size="16" font-weight="600">Bedtime lockout</text>
    <text x="418" y="200" fill="#A6A7B2" font-size="12.5">Blocked · 23:00–07:00 · weekdays</text>
    <text x="418" y="224" fill="#A6A7B2" font-size="12.5">Instagram, TikTok, Reddit</text>
    <circle cx="424" cy="262" r="5" fill="#9B9BA6"/>
    <text x="436" y="266" fill="#A6A7B2" font-size="12.5">Off-hours</text>

    <!-- new rule tile -->
    <rect x="44" y="306" width="320" height="120" rx="14" fill="none" stroke="url(#acc)" stroke-width="1.5"/>
    <text x="204" y="372" fill="#8071F2" font-size="15" font-weight="600" text-anchor="middle">+  New rule</text>
  </g>
</svg>
