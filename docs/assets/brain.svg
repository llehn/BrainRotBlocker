<svg viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A melting, hypnotized brain">
  <defs>
    <radialGradient id="brbGoo" cx="0.5" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#FBD4E6"/>
      <stop offset="1" stop-color="#EBA6C8"/>
    </radialGradient>
  </defs>

  <!-- melt puddle -->
  <ellipse cx="130" cy="232" rx="92" ry="16" fill="#E59DC1" opacity="0.45"/>

  <!-- drips -->
  <g fill="#EFB6D5">
    <path d="M86 150 q-9 0 -9 30 q0 22 9 22 q9 0 9 -22 q0 -30 -9 -30 z"/>
    <path d="M170 150 q-8 0 -8 40 q0 20 8 20 q8 0 8 -20 q0 -40 -8 -40 z"/>
    <circle cx="128" cy="244" r="6"/>
  </g>

  <!-- brain body (lumpy cauliflower) -->
  <g fill="url(#brbGoo)">
    <ellipse cx="130" cy="122" rx="84" ry="66"/>
    <circle cx="70" cy="66" r="28"/>
    <circle cx="106" cy="56" r="28"/>
    <circle cx="154" cy="56" r="28"/>
    <circle cx="190" cy="66" r="28"/>
    <circle cx="52" cy="116" r="26"/>
    <circle cx="208" cy="116" r="26"/>
    <ellipse cx="130" cy="160" rx="74" ry="40"/>
  </g>

  <!-- seam + wrinkles -->
  <g fill="none" stroke="#D183B5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <path d="M130 50 C122 70 138 78 130 96"/>
    <path d="M70 74 C60 84 74 88 64 100"/>
    <path d="M104 70 C96 80 110 84 102 94"/>
    <path d="M156 70 C164 80 150 84 158 94"/>
    <path d="M190 74 C200 84 186 88 196 100"/>
  </g>

  <!-- derpy hypnotized eyes -->
  <g>
    <ellipse cx="100" cy="132" rx="24" ry="28" fill="#fff" stroke="#C76FAA" stroke-width="2.5"/>
    <circle cx="100" cy="132" r="15" fill="none" stroke="#B14BE0" stroke-width="3"/>
    <circle cx="100" cy="132" r="7" fill="none" stroke="#B14BE0" stroke-width="3"/>
    <circle cx="104" cy="135" r="4.5" fill="#241B2E"/>

    <ellipse cx="160" cy="132" rx="24" ry="28" fill="#fff" stroke="#C76FAA" stroke-width="2.5"/>
    <circle cx="160" cy="132" r="15" fill="none" stroke="#7C5CFF" stroke-width="3"/>
    <circle cx="160" cy="132" r="7" fill="none" stroke="#7C5CFF" stroke-width="3"/>
    <circle cx="156" cy="136" r="4.5" fill="#241B2E"/>
  </g>

  <!-- drooly tongue -->
  <path d="M118 168 q12 0 12 16 q0 14 -12 14 q-12 0 -12 -14 q0 -16 12 -16 z" fill="#F0608A"/>
  <path d="M118 170 q0 16 0 26" fill="none" stroke="#D43C68" stroke-width="2.5" stroke-linecap="round"/>
